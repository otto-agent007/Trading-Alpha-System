services:
  ollama:
    image: ollama/ollama:latest
    container_name: alpha-ollama
    volumes:
     - /mnt/2TBHDD/trading-alpha/ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped

  alpha-app:
    build: .
    container_name: alpha-app
    depends_on:
      - ollama
    volumes:
      - /home/user1/Desktop/AlphaVault:/app/obsidian_vault
      - /mnt/2TBHDD/trading-alpha/data:/app/data
      - /mnt/2TBHDD/trading-alpha/memory:/app/memory
      - /mnt/2TBHDD/trading-alpha/logs:/app/logs
    environment:
      # LLM — tiered routing
      - OLLAMA_HOST=http://ollama:11434
      - LIGHT_MODEL=qwen3.5:4b
      - HEAVY_MODEL=anthropic/claude-opus-4-6
      - OPENROUTER_API_KEY=sk-or-XXXXXXXXXXXXXXXXXXXXXXXX   # ← PUT YOUR KEY HERE

      # Embeddings (optional — Gemini for semantic memory)
      # - GOOGLE_API_KEY=your-google-api-key

      # Platform API keys
      # - KALSHI_API_KEY=your-kalshi-api-key
      # - KALSHI_API_SECRET=your-kalshi-api-secret

      # Trading
      - PAPER_MODE=true
      - INITIAL_BANKROLL=1000
      - MAX_POSITION_PCT=0.05

      # Schedule
      - SCAN_INTERVAL_HOURS=2
      - ANALYSIS_INTERVAL_HOURS=4
      - REVIEW_HOUR_UTC=3

      # Paths
      - OBSIDIAN_VAULT=/app/obsidian_vault
      - MEMORY_PATH=/app/memory
      - DATA_PATH=/app/data
    mem_limit: 5g
    restart: unless-stopped

volumes:
  ollama_data:
